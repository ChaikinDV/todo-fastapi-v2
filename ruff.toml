# ruff.toml
# Конфигурация Ruff линтера и форматтера

# Какие файлы и папки исключаем из проверки
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "alembic",      # миграции Alembic не проверяем
    "tests",        # тесты могут иметь свои особенности
]

# Версия Python, которую используем
target-version = "py311"

# Максимальная длина строки (форматтер будет переносить)
line-length = 100

# ==================== НАСТРОЙКИ ЛИНТЕРА ====================
[lint]

# Выбираем наборы правил для проверки
select = [
    "E",   # ошибки Pycodestyle (PEP8)
    "F",   # ошибки Pyflakes (неиспользуемые переменные, импорты)
    "W",   # предупреждения Pycodestyle
    "I",   # сортировка импортов (как isort)
    "UP",  # обновление кода до новых версий Python
    "C4",  # упрощение генераторов списков
    "SIM", # упрощение кода (flake8-simplify)
]

# Игнорируем ненужные правила
ignore = [
    "E501",  # слишком длинная строка (форматтер сам решит)
]

# ==================== НАСТРОЙКИ ФОРМАТТЕРА ====================
[format]

# Стиль кавычек
quote-style = "double"

# Стиль отступов
indent-style = "space"

# Не трогать магические запятые
skip-magic-trailing-comma = false

# Тип окончания строки
line-ending = "auto"
