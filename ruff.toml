exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "alembic",
    "tests",
]

target-version = "py311"

line-length = 100

[lint]

select = [
    "E",
    "F",
    "W",
    "I",
    "UP",
    "C4",
    "SIM",
]

ignore = [
    "E501",
]

[format]

quote-style = "double"

indent-style = "space"

skip-magic-trailing-comma = false

line-ending = "auto"
